<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - DineGrid</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #5a4a3a 0%, #8B6F47 50%, #6b5d4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            color: #fff;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 40%, rgba(212, 165, 116, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 60%, rgba(139, 111, 71, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(180, 130, 80, 0.2) 0%, transparent 60%),
                repeating-linear-gradient(90deg, transparent, transparent 100px, rgba(212, 165, 116, 0.05) 100px, rgba(212, 165, 116, 0.05) 101px),
                repeating-linear-gradient(0deg, transparent, transparent 100px, rgba(212, 165, 116, 0.03) 100px, rgba(212, 165, 116, 0.03) 101px);
            pointer-events: none;
            z-index: 0;
            animation: warmGlow 10s ease-in-out infinite;
        }

        @keyframes warmGlow {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        body::after {
            content: '☕ 🍽️ 🍷';
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 2rem;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            background: linear-gradient(135deg, rgba(90, 74, 58, 0.95) 0%, rgba(139, 111, 71, 0.95) 100%);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            padding: 60px 45px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212, 165, 116, 0.4);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 2px solid rgba(212, 165, 116, 0.5);
            position: relative;
            z-index: 1;
        }

        .login-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.5), rgba(180, 130, 80, 0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.6;
        }

        .login-container h1 {
            color: #D4A574;
            margin-bottom: 30px;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(212, 165, 116, 0.4);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .login-container.hidden {
            display: none !important;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #D4A574;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(212, 165, 116, 0.4);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-group input:focus {
            outline: none;
            border-color: #D4A574;
            background: rgba(212, 165, 116, 0.08);
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.4), inset 0 0 10px rgba(212, 165, 116, 0.05);
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #D4A574 0%, #c99763 100%);
            color: #2d2416;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.5), inset 0 -2px 5px rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(212, 165, 116, 0.7), inset 0 -2px 5px rgba(0, 0, 0, 0.2);
        }

        .error {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 0.9rem;
            padding: 10px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 8px;
            border-left: 3px solid #ff6b6b;
            display: none;
        }

        .error.show {
            display: block;
        }

        .dashboard {
            background: linear-gradient(135deg, rgba(90, 74, 58, 0.95) 0%, rgba(139, 111, 71, 0.95) 100%);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212, 165, 116, 0.4);
            max-width: 1250px;
            width: 100%;
            border: 2px solid rgba(212, 165, 116, 0.5);
            position: relative;
            z-index: 1;
            max-height: 90vh;
            overflow-y: auto;
        }

        .dashboard.hidden {
            display: none !important;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid rgba(212, 165, 116, 0.4);
            padding-bottom: 25px;
        }

        .dashboard-header h1 {
            color: #D4A574;
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(212, 165, 116, 0.4);
        }

        .logout-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #c23b22 0%, #a02f1a 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(194, 59, 34, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(194, 59, 34, 0.6);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.2) 0%, rgba(180, 130, 80, 0.15) 100%);
            color: #fff;
            padding: 40px 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(212, 165, 116, 0.25), inset 0 1px 0 rgba(212, 165, 116, 0.3);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(212, 165, 116, 0.4);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.15) 0%, transparent 50%);
            border-radius: 15px;
            pointer-events: none;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 48px rgba(212, 165, 116, 0.35), inset 0 1px 0 rgba(212, 165, 116, 0.4);
            border-color: rgba(212, 165, 116, 0.7);
        }

        .stat-card h3 {
            color: #D4A574;
            font-size: 2.8rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .stat-card p {
            opacity: 0.9;
        }

        .data-section {
            margin-bottom: 30px;
        }

        .data-section h2 {
            color: #D4A574;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(212, 165, 116, 0.4);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            overflow-x: auto;
            background: rgba(212, 165, 116, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(212, 165, 116, 0.2);
            color: #fff;
        }

        th {
            background: rgba(212, 165, 116, 0.25);
            color: #D4A574;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        tr:hover {
            background: rgba(212, 165, 116, 0.15);
            border-left: 3px solid #D4A574;
        }

        .no-data {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            padding: 20px;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #D4A574 0%, #c99763 100%);
            color: #2d2416;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            margin-bottom: 15px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(212, 165, 116, 0.6);
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div class="login-container" id="loginContainer">
        <h1>🔐 Admin Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
            <div id="loginError" class="error"></div>
        </form>
    </div>

    <!-- Dashboard -->
    <div class="dashboard hidden" id="dashboard">
        <div class="dashboard-header">
            <h1>📊 Admin Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- Stats -->
        <div class="stats" id="stats">
            <div class="stat-card">
                <h3 id="userCount">0</h3>
                <p>Total Users</p>
            </div>
            <div class="stat-card">
                <h3 id="businessCount">0</h3>
                <p>Total Businesses</p>
            </div>
            <div class="stat-card">
                <h3 id="loginCount">0</h3>
                <p>Total Logins</p>
            </div>
        </div>

        <!-- Users Section -->
        <div class="data-section">
            <h2>👥 Users</h2>
            <button class="refresh-btn" onclick="loadUsers()">Refresh</button>
            <div id="usersTable"></div>
        </div>

        <!-- Businesses Section -->
        <div class="data-section">
            <h2>🏢 Businesses</h2>
            <button class="refresh-btn" onclick="loadBusinesses()">Refresh</button>
            <div id="businessTable"></div>
        </div>

        <!-- Logins Section -->
        <div class="data-section">
            <h2>🔑 Login Activity</h2>
            <button class="refresh-btn" onclick="loadLogins()">Refresh</button>
            <div id="loginsTable"></div>
        </div>
    </div>

    <script>
        let authToken = localStorage.getItem('adminToken');

        // Wait for DOM to be fully ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ Admin page loaded');
            
            // Login Form
            const loginForm = document.getElementById('loginForm');
            const loginBtn = loginForm.querySelector('.login-btn');
            
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                console.log('🔐 Form submitted!');
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const errorDiv = document.getElementById('loginError');
                
                console.log('📝 Form data - Username:', username, 'Password length:', password.length);

                // Show loading state
                loginBtn.disabled = true;
                loginBtn.textContent = 'Logging in...';
                errorDiv.classList.remove('show');

                try {
                    console.log('🔐 Attempting login with username:', username);
                    const response = await fetch('http://127.0.0.1:5000/api/admin/login', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ username, password }),
                        credentials: 'include'
                    });

                    console.log('📨 Login response status:', response.status);
                    const data = await response.json();
                    console.log('📦 Login response data:', data);

                    if (data.success) {
                        authToken = data.token;
                        console.log('✅ Login successful! Token:', authToken);
                        localStorage.setItem('adminToken', authToken);
                        showDashboard();
                        await new Promise(r => setTimeout(r, 500));
                        loadStats();
                        loadUsers();
                        loadBusinesses();
                        loadLogins();
                    } else {
                        throw new Error(data.error || 'Login failed');
                    }
                } catch (err) {
                    console.error('❌ Login error:', err);
                    errorDiv.textContent = '❌ ' + err.message;
                    errorDiv.classList.add('show');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            });

            function showDashboard() {
                document.getElementById('loginContainer').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            }

            function logout() {
                localStorage.removeItem('adminToken');
                authToken = null;
                document.getElementById('loginContainer').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
                document.getElementById('loginForm').reset();
            }

            // Load Stats
            async function loadStats() {
            try {
                console.log('📊 Loading stats with token:', authToken);
                const response = await fetch('http://127.0.0.1:5000/api/admin/stats', {
                    headers: { 
                        'Authorization': `Bearer ${authToken}`,
                        'Accept': 'application/json'
                    },
                    credentials: 'include'
                });
                console.log('📊 Stats response status:', response.status);
                const data = await response.json();
                console.log('📊 Stats data:', data);
                document.getElementById('userCount').textContent = data.totalUsers || 0;
                document.getElementById('businessCount').textContent = data.totalBusinesses || 0;
                document.getElementById('loginCount').textContent = data.totalLogins || 0;
            } catch (err) {
                console.error('Error loading stats:', err);
            }
        }

            // Load Users
            async function loadUsers() {
                try {
                    const response = await fetch('http://127.0.0.1:5000/api/admin/users?page=1&limit=50', {
                        headers: { 
                            'Authorization': `Bearer ${authToken}`,
                            'Accept': 'application/json'
                        },
                        credentials: 'include'
                    });
                    const result = await response.json();
                    const users = result.data || result; // Handle both formats

                    let html = '';
                    if (users && users.length > 0) {
                        html = `<table>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>State</th>
                                <th>Date</th>
                            </tr>`;
                        users.forEach(u => {
                            html += `<tr>
                                <td>${u.name || '-'}</td>
                                <td>${u.email || '-'}</td>
                                <td>${u.phone || '-'}</td>
                                <td>${u.state || '-'}</td>
                                <td>${new Date(u.createdAt || u.timestamp).toLocaleDateString()}</td>
                            </tr>`;
                        });
                        html += '</table>';
                    } else {
                        html = '<div class="no-data">No users yet</div>';
                    }
                    document.getElementById('usersTable').innerHTML = html;
                } catch (err) {
                    console.error('Error loading users:', err);
                    document.getElementById('usersTable').innerHTML = `<div class="no-data">❌ Error loading users</div>`;
                }
            }

            // Load Businesses
            async function loadBusinesses() {
                try {
                    const response = await fetch('http://127.0.0.1:5000/api/admin/businesses?page=1&limit=50', {
                        headers: { 
                            'Authorization': `Bearer ${authToken}`,
                            'Accept': 'application/json'
                        },
                        credentials: 'include'
                    });
                    const result = await response.json();
                    const businesses = result.data || result; // Handle both formats

                    let html = '';
                    if (businesses && businesses.length > 0) {
                        html = `<table>
                            <tr>
                                <th>Business Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>City</th>
                                <th>Date</th>
                            </tr>`;
                        businesses.forEach(b => {
                            html += `<tr>
                                <td>${b.name || '-'}</td>
                                <td>${b.email || '-'}</td>
                                <td>${b.phone || '-'}</td>
                                <td>${b.city || b.state || '-'}</td>
                                <td>${new Date(b.createdAt || b.timestamp).toLocaleDateString()}</td>
                            </tr>`;
                        });
                        html += '</table>';
                    } else {
                        html = '<div class="no-data">No businesses yet</div>';
                    }
                    document.getElementById('businessTable').innerHTML = html;
                } catch (err) {
                    console.error('Error loading businesses:', err);
                    document.getElementById('businessTable').innerHTML = `<div class="no-data">❌ Error loading businesses</div>`;
                }
            }

            // Load Logins
            async function loadLogins() {
                try {
                    const response = await fetch('http://127.0.0.1:5000/api/admin/logins?page=1&limit=50', {
                        headers: { 
                            'Authorization': `Bearer ${authToken}`,
                            'Accept': 'application/json'
                        },
                        credentials: 'include'
                    });
                    const result = await response.json();
                    const logins = result.data || result; // Handle both formats

                    let html = '';
                    if (logins && logins.length > 0) {
                        html = `<table>
                            <tr>
                                <th>Email</th>
                                <th>Type</th>
                                <th>Action</th>
                                <th>Date</th>
                            </tr>`;
                        logins.forEach(l => {
                            html += `<tr>
                                <td>${l.email || '-'}</td>
                                <td>${l.type || '-'}</td>
                                <td>${l.action || l.type || '-'}</td>
                                <td>${new Date(l.timestamp).toLocaleDateString()}</td>
                            </tr>`;
                        });
                        html += '</table>';
                    } else {
                        html = '<div class="no-data">No login activity yet</div>';
                    }
                    document.getElementById('loginsTable').innerHTML = html;
                } catch (err) {
                    console.error('Error loading logins:', err);
                    document.getElementById('loginsTable').innerHTML = `<div class="no-data">❌ Error loading logins</div>`;
                }
            }
</html>
